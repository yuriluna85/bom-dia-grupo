<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Mensagens Aleatórias</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #mensagem {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 1.5rem;
            min-height: 1.6em;
        }
        button {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="mensagem">Clique no botão abaixo!</div>
    <button onclick="gerarMensagem()">Buscar Mensagem</button>
</div>

<script>
    let ultimaSemente = -1;

    function gerarMensagem() {
        const mensagens = [
            "☀️ Bom dia!", 
            "🌙 Boa Noite!", 
            "🌤️ Boa Tarde!", 
            "🎂 Feliz Aniversário!"
        ];

        let novaSemente;
        
        // Lógica para garantir que a mensagem seja diferente da anterior
        do {
            novaSemente = Math.floor(Math.random() * mensagens.length);
        } while (novaSemente === ultimaSemente);

        ultimaSemente = novaSemente;
        document.getElementById('mensagem').innerText = mensagens[novaSemente];
    }
</script>

</body>
</html>
